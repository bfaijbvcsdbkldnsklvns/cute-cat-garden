<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐱 小猫咪的秘密花园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #FFF9C4 0%, #FFE082 50%, #FFD54F 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .header {
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 26px;
            color: #F57C00;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: #FF8F00;
            opacity: 0.9;
        }

        /* 猫咪容器 - 带花 */
        .cat-scene {
            position: relative;
            margin: 20px auto;
            width: 220px;
            height: 240px;
        }

        .cat-container {
            position: relative;
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin: 0 auto;
        }

        .cat-container:hover {
            transform: scale(1.05);
        }

        .cat {
            font-size: 100px;
            animation: float 3s ease-in-out infinite;
            user-select: none;
            position: relative;
            z-index: 2;
        }

        /* 小猫咪手里的花 */
        .flower-in-hand {
            position: absolute;
            font-size: 40px;
            right: -10px;
            bottom: 40px;
            animation: sway 2s ease-in-out infinite;
            z-index: 3;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.2));
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* 喂猫按钮 */
        .feed-button {
            background: linear-gradient(135deg, #FF8A65 0%, #FF7043 100%);
            border: none;
            border-radius: 50px;
            padding: 12px 25px;
            font-size: 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 112, 67, 0.4);
            transition: all 0.3s ease;
            margin: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .feed-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 112, 67, 0.5);
        }

        .feed-button:active {
            transform: scale(0.95);
        }

        .feed-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 奖励弹出 */
        .reward-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #FFF59D 0%, #FFE082 100%);
            border-radius: 25px;
            padding: 30px 40px;
            box-shadow: 0 20px 50px rgba(255, 193, 7, 0.5);
            z-index: 1000;
            text-align: center;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .reward-popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .reward-amount {
            font-size: 48px;
            color: #F57C00;
            font-weight: bold;
            margin: 15px 0;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .reward-text {
            font-size: 18px;
            color: #FF8F00;
            margin-bottom: 10px;
        }

        .reward-close {
            background: #FFB300;
            border: none;
            border-radius: 20px;
            padding: 10px 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .reward-close:hover {
            background: #FFA000;
        }

        /* 金币显示 */
        .coins-display {
            background: linear-gradient(135deg, #FFD54F 0%, #FFB300 100%);
            border-radius: 30px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 15px auto;
            box-shadow: 0 3px 10px rgba(255, 179, 0, 0.3);
        }

        .coins-icon {
            font-size: 24px;
        }

        .coins-amount {
            font-size: 22px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .heart {
            position: absolute;
            font-size: 30px;
            opacity: 0;
            animation: heartFloat 2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes heartFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-50px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0.5);
            }
        }

        .message-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(255, 193, 7, 0.3);
            max-width: 380px;
            position: relative;
        }

        .message-box::before {
            content: '💛';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
        }

        .message {
            font-size: 17px;
            color: #F57C00;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .click-hint {
            font-size: 13px;
            color: #FFB300;
            opacity: 0.7;
            margin-top: 8px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px auto;
            max-width: 350px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            background: white;
            border-radius: 15px;
            padding: 12px 18px;
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.2);
            min-width: 80px;
        }

        .stat-number {
            font-size: 22px;
            color: #F57C00;
            font-weight: bold;
        }

        .stat-label {
            font-size: 11px;
            color: #FFB300;
            margin-top: 4px;
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .floating-item {
            position: absolute;
            font-size: 28px;
            animation: floatRandom 15s infinite;
            opacity: 0.25;
        }

        @keyframes floatRandom {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
            }
            50% {
                transform: translateY(-100px) rotate(180deg);
            }
        }

        .secret-message {
            display: none;
            background: linear-gradient(135deg, #FFF59D 0%, #FFE082 100%);
            border-radius: 20px;
            padding: 25px;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(255, 193, 7, 0.4);
            max-width: 380px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .secret-title {
            font-size: 20px;
            color: #F57C00;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .secret-text {
            font-size: 15px;
            color: #FF8F00;
            line-height: 1.8;
        }

        .paw-prints {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 20px;
            opacity: 0.3;
        }

        .sun {
            position: fixed;
            top: 30px;
            right: 30px;
            font-size: 50px;
            animation: rotate 20s linear infinite;
            opacity: 0.6;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .button {
            background: linear-gradient(135deg, #FFD54F 0%, #FFB300 100%);
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-size: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 179, 0, 0.4);
            transition: all 0.3s ease;
            margin: 8px;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 179, 0, 0.5);
        }

        .button:active {
            transform: translateY(0);
        }

        /* 猫咪吃东西动画 */
        .cat.eating {
            animation: eating 0.5s ease;
        }

        @keyframes eating {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1) rotate(-5deg); }
            50% { transform: scale(1.15); }
            75% { transform: scale(1.1) rotate(5deg); }
        }

        /* 食物飞向猫咪 */
        .food-item {
            position: absolute;
            font-size: 30px;
            z-index: 100;
            animation: flyToCat 0.8s ease-out forwards;
        }

        @keyframes flyToCat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(0.5);
            }
        }

        /* 喂食记录 */
        .feed-history {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin: 15px auto;
            max-width: 380px;
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.2);
        }

        .feed-history-title {
            font-size: 14px;
            color: #FF8F00;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .feed-history-list {
            font-size: 13px;
            color: #F57C00;
            max-height: 100px;
            overflow-y: auto;
        }

        .feed-history-item {
            padding: 5px 0;
            border-bottom: 1px dashed #FFE082;
        }

        .feed-history-item:last-child {
            border-bottom: none;
        }

        .hidden {
            display: none;
        }

        .show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="floating-elements" id="floatingElements"></div>
    
    <div class="sun">☀️</div>
    
    <div class="container">
        <div class="header">
            <div class="title">🐱 小猫咪的秘密花园 💛</div>
            <div class="subtitle">点击猫咪互动，喂猫有惊喜！</div>
        </div>

        <!-- 金币显示 -->
        <div class="coins-display">
            <span class="coins-icon">🪙</span>
            <span class="coins-amount" id="coins">0</span>
        </div>

        <!-- 猫咪场景 - 带花 -->
        <div class="cat-scene">
            <div class="cat-container" id="catContainer" onclick="clickCat()">
                <div class="cat" id="cat">🐱</div>
                <div class="flower-in-hand">🌻</div>
            </div>
        </div>

        <!-- 喂猫按钮 -->
        <button class="feed-button" id="feedButton" onclick="feedCat()">
            🐟 喂小猫咪
        </button>

        <div class="message-box">
            <div class="message" id="message">
                嗨！我是小猫咪~<br>
                我手里拿着向日葵🌻送给你！<br>
                点击我或者喂我都有惊喜哦！✨
            </div>
            <div class="click-hint">已互动 <span id="clickCount">0</span> 次 | 喂食 <span id="feedCount">0</span> 次</div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="hearts">0</div>
                <div class="stat-label">爱心</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="stars">0</div>
                <div class="stat-label">星星</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="flowers">0</div>
                <div class="stat-label">花朵</div>
            </div>
        </div>

        <!-- 喂食记录 -->
        <div class="feed-history">
            <div class="feed-history-title">📜 喂食记录</div>
            <div class="feed-history-list" id="feedHistory">
                <div style="color: #FFB300; font-size: 12px;">还没有喂过小猫咪哦~</div>
            </div>
        </div>

        <div class="secret-message" id="secretMessage">
            <div class="secret-title">🌟 秘密消息 🌟</div>
            <div class="secret-text" id="secretText">
                恭喜你发现了秘密！<br>
                这个小花园是为你准备的 💛
            </div>
        </div>

        <button class="button" onclick="changeMessage()">换一条消息</button>
        <button class="button" onclick="showSecret()">查看秘密</button>
    </div>

    <!-- 奖励弹窗 -->
    <div class="reward-popup" id="rewardPopup">
        <div class="reward-text">🎉 恭喜获得奖励！</div>
        <div class="reward-amount" id="rewardAmount">+50</div>
        <div class="reward-text">小猫咪很开心！💛</div>
        <button class="reward-close" onclick="closeReward()">太棒了！</button>
    </div>

    <div class="paw-prints">🐾</div>

    <script>
        let clickCount = 0;
        let feedCount = 0;
        let hearts = 0;
        let stars = 0;
        let flowers = 0;
        let coins = 0;
        let feedHistoryList = [];

        const messages = [
            "今天也要开心哦！🐱",
            "你笑起来真好看~",
            "小猫咪想你了 💛",
            "今天天气真好，适合想你",
            "你是最可爱的人！",
            "小猫咪给你比心~ 💕",
            "希望你今天也元气满满！",
            "你值得所有美好的事物 ✨",
            "小猫咪永远支持你！",
            "你的笑容是我的阳光 ☀️",
            "我手里的花送给你！🌻",
            "谢谢你来看我~"
        ];

        const secretMessages = [
            "这个页面是专门为你做的 💛<br>希望你喜欢",
            "每一只猫咪都代表一个想念<br>点击它们，收获爱",
            "黄色是温暖的颜色<br>就像你给我的感觉",
            "小猫咪的秘密：<br>其实我很喜欢你 🐱💕",
            "这个花园永远为你开放<br>随时欢迎回来",
            "喂我越多，我越开心！<br>每次都有惊喜哦~"
        ];

        const foods = ['🐟', '🍖', '🥛', '🍤', '🍗'];

        // 创建漂浮元素
        function createFloatingElements() {
            const container = document.getElementById('floatingElements');
            const items = ['🐱', '💛', '✨', '🌸', '⭐', '🌻', '🦋', '🐝'];
            
            for (let i = 0; i < 12; i++) {
                const item = document.createElement('div');
                item.className = 'floating-item';
                item.textContent = items[Math.floor(Math.random() * items.length)];
                item.style.left = Math.random() * 100 + '%';
                item.style.animationDelay = Math.random() * 15 + 's';
                item.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(item);
            }
        }

        // 点击猫咪
        function clickCat() {
            clickCount++;
            document.getElementById('clickCount').textContent = clickCount;

            // 随机增加爱心、星星或花朵
            const rand = Math.random();
            if (rand < 0.33) {
                hearts++;
                document.getElementById('hearts').textContent = hearts;
                createHeart('💕');
            } else if (rand < 0.66) {
                stars++;
                document.getElementById('stars').textContent = stars;
                createHeart('⭐');
            } else {
                flowers++;
                document.getElementById('flowers').textContent = flowers;
                createHeart('🌸');
            }

            // 每10次点击显示特殊消息
            if (clickCount % 10 === 0) {
                const bonusCoins = Math.floor(Math.random() * 20) + 10;
                coins += bonusCoins;
                document.getElementById('coins').textContent = coins;
                showMessage("哇！你已经互动了 " + clickCount + " 次！<br>小猫咪奖励你 " + bonusCoins + " 金币！🪙");
            }
        }

        // 喂猫
        function feedCat() {
            feedCount++;
            document.getElementById('feedCount').textContent = feedCount;

            // 禁用按钮防止连续点击
            const btn = document.getElementById('feedButton');
            btn.disabled = true;

            // 显示食物飞向猫咪的动画
            const catContainer = document.getElementById('catContainer');
            const food = document.createElement('div');
            food.className = 'food-item';
            food.textContent = foods[Math.floor(Math.random() * foods.length)];
            food.style.left = '50%';
            food.style.bottom = '0';
            catContainer.appendChild(food);

            // 猫咪吃东西动画
            const cat = document.getElementById('cat');
            setTimeout(() => {
                cat.classList.add('eating');
            }, 400);

            setTimeout(() => {
                cat.classList.remove('eating');
                food.remove();
                btn.disabled = false;
            }, 800);

            // 随机奖励 10-100 金币
            const reward = Math.floor(Math.random() * 91) + 10; // 10-100
            coins += reward;
            document.getElementById('coins').textContent = coins;

            // 记录喂食历史
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                           now.getMinutes().toString().padStart(2, '0') + ':' + 
                           now.getSeconds().toString().padStart(2, '0');
            feedHistoryList.unshift({
                time: timeStr,
                reward: reward
            });

            // 只保留最近10条
            if (feedHistoryList.length > 10) {
                feedHistoryList.pop();
            }

            updateFeedHistory();

            // 显示奖励弹窗
            showReward(reward);
        }

        // 更新喂食历史
        function updateFeedHistory() {
            const historyDiv = document.getElementById('feedHistory');
            if (feedHistoryList.length === 0) {
                historyDiv.innerHTML = '<div style="color: #FFB300; font-size: 12px;">还没有喂过小猫咪哦~</div>';
            } else {
                historyDiv.innerHTML = feedHistoryList.map(item => 
                    `<div class="feed-history-item">${item.time} - 获得 <strong>+${item.reward}</strong> 金币 🪙</div>`
                ).join('');
            }
        }

        // 显示奖励弹窗
        function showReward(amount) {
            const popup = document.getElementById('rewardPopup');
            const amountDiv = document.getElementById('rewardAmount');
            amountDiv.textContent = '+' + amount;
            popup.classList.add('show');
        }

        // 关闭奖励弹窗
        function closeReward() {
            const popup = document.getElementById('rewardPopup');
            popup.classList.remove('show');
        }

        // 创建飘动的爱心
        function createHeart(emoji) {
            const container = document.getElementById('catContainer');
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = emoji;
            heart.style.left = Math.random() * 150 + 'px';
            heart.style.top = Math.random() * 100 + 'px';
            container.appendChild(heart);

            setTimeout(() => heart.remove(), 2000);
        }

        // 显示消息
        function showMessage(msg) {
            document.getElementById('message').innerHTML = msg;
        }

        // 换消息
        function changeMessage() {
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            showMessage(randomMsg);
        }

        // 显示秘密
        function showSecret() {
            const secretDiv = document.getElementById('secretMessage');
            const secretText = document.getElementById('secretText');
            
            if (secretDiv.style.display === 'block') {
                secretDiv.style.display = 'none';
            } else {
                const randomSecret = secretMessages[Math.floor(Math.random() * secretMessages.length)];
                secretText.innerHTML = randomSecret;
                secretDiv.style.display = 'block';
            }
        }

        // 初始化
        createFloatingElements();

        // 显示欢迎消息
        setTimeout(() => {
            showMessage("欢迎来到小猫咪的秘密花园！<br>我手里拿着向日葵🌻送给你~<br>喂我有惊喜哦！");
        }, 1000);
    </script>
</body>
</html>
